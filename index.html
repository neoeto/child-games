<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝贝益智游戏乐园">
  <title>宝贝益智游戏乐园</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      touch-action: manipulation;
      overscroll-behavior: contain;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #4a3520;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(env(safe-area-inset-top) + 28px)
        env(safe-area-inset-right)
        calc(env(safe-area-inset-bottom) + 28px)
        env(safe-area-inset-left);
      background:
        radial-gradient(ellipse at 50% 0%, #fff6d0 0%, rgba(255, 246, 208, 0) 60%),
        radial-gradient(ellipse at 0% 100%, #ffe9a8 0%, rgba(255, 233, 168, 0) 55%),
        radial-gradient(ellipse at 100% 100%, #ffd97a 0%, rgba(255, 217, 122, 0) 55%),
        linear-gradient(180deg, #fff4cc 0%, #ffeab5 100%);
      background-attachment: fixed;
    }

    /* ===== Header ===== */
    header {
      text-align: center;
      margin-bottom: 28px;
      animation: drop-in 500ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #5a3a1a;
      text-shadow: 0 2px 0 rgba(255, 255, 255, 0.6);
      line-height: 1.1;
    }

    header p {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 500;
      color: #8a6a4a;
      letter-spacing: 0.5px;
    }

    /* ===== Game Grid ===== */
    .game-grid {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    /* ===== Game Card (shared) ===== */
    .game-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      min-height: 180px;
      border-radius: 24px;
      text-align: center;
      text-decoration: none;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }

    /* ===== Active Card ===== */
    .game-card.active {
      background: linear-gradient(180deg, #fff6d8 0%, #ffe1a0 100%);
      box-shadow:
        0 8px 22px rgba(200, 130, 30, 0.22),
        inset 0 0 0 2px rgba(255, 217, 122, 0.7);
      cursor: pointer;
      animation: card-pop 500ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .game-card.active:nth-child(1) { animation-delay: 80ms; }

    .game-card.active:hover {
      transform: translateY(-3px);
      box-shadow:
        0 12px 28px rgba(200, 130, 30, 0.28),
        inset 0 0 0 2px rgba(255, 217, 122, 0.9);
    }

    .game-card.active:active {
      transform: translateY(0) scale(0.98);
    }

    .game-card .thumb {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 40%, #ffffff 0%, #fff4cc 100%);
      box-shadow: 0 4px 12px rgba(180, 130, 50, 0.2);
      margin-bottom: 14px;
    }

    .game-card .thumb img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .game-card h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #5a3a1a;
      margin-bottom: 4px;
    }

    .game-card .desc {
      font-size: 15px;
      font-weight: 500;
      color: #8a6a4a;
      letter-spacing: 0.3px;
    }

    /* ===== Placeholder Card ===== */
    .game-card.placeholder {
      background: #f0ece5;
      box-shadow:
        0 4px 12px rgba(150, 130, 100, 0.1),
        inset 0 0 0 1px rgba(150, 130, 100, 0.12);
      opacity: 0.65;
      cursor: default;
      animation: card-fade 500ms ease both;
    }

    .game-card.placeholder:nth-child(2) { animation-delay: 140ms; }
    .game-card.placeholder:nth-child(3) { animation-delay: 200ms; }
    .game-card.placeholder:nth-child(4) { animation-delay: 260ms; }

    .placeholder-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #d8d0c4;
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .game-card.placeholder p {
      font-size: 16px;
      font-weight: 600;
      color: #a89888;
      letter-spacing: 0.5px;
    }

    /* ===== Animations ===== */
    @keyframes drop-in {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes card-pop {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes card-fade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 0.65; transform: translateY(0); }
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .game-grid {
        grid-template-columns: 1fr;
        max-width: 320px;
      }
      h1 { font-size: 34px; }
      header p { font-size: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>宝贝益智游戏乐园</h1>
    <p>选一个游戏开始玩吧！</p>
  </header>

  <main class="game-grid">
    <a class="game-card active" href="wuziqi/index.html" aria-label="JoJo五子棋">
      <span class="thumb">
        <img src="wuziqi/resources/jojo.png" alt="JoJo">
      </span>
      <h2>JoJo五子棋</h2>
      <p class="desc">五子连线，家人排队</p>
    </a>

    <div class="game-card placeholder" aria-hidden="true">
      <span class="placeholder-icon">?</span>
      <p>敬请期待</p>
    </div>

    <div class="game-card placeholder" aria-hidden="true">
      <span class="placeholder-icon">?</span>
      <p>敬请期待</p>
    </div>

    <div class="game-card placeholder" aria-hidden="true">
      <span class="placeholder-icon">?</span>
      <p>敬请期待</p>
    </div>
  </main>
</body>
</html>
